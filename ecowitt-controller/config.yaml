name: Ecowitt Controller
version: "2.0.3-3"
slug: ecowitt-controller
description: >-
  Bridge Ecowitt weather stations and IoT subdevices (AC1100, WFC01, WFC02)
  to MQTT with Home Assistant auto-discovery.
url: https://github.com/mplogas/ecowitt-controller
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: true
host_network: false

ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: Ecowitt weather data receiver

hassio_api: true
services:
  - mqtt:want

watchdog: tcp://[HOST]:8080

options:
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  mqtt_base_topic: ecowitt
  mqtt_client_id: ecowitt-controller
  mqtt_use_311: false
  polling_interval: 30
  unit: metric
  precision: 2
  homeassistant_discovery: true
  log_level: Warning
  gateways:
    - name: ""
      ip: ""
      subdevices: false

schema:
  mqtt_host: str?
  mqtt_port: port?
  mqtt_user: str?
  mqtt_password: password?
  mqtt_base_topic: str
  mqtt_client_id: str
  mqtt_use_311: bool
  polling_interval: int(10,3600)
  unit: list(metric|imperial)
  precision: int(0,6)
  homeassistant_discovery: bool
  log_level: list(Verbose|Debug|Information|Warning|Error|Fatal)
  gateways:
    - name: str
      ip: str
      subdevices: bool
